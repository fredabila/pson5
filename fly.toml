# fly.toml app configuration file generated for pson5 on 2026-04-25T03:17:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pson5'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  PSON_ACCESS_AUDIT_ENABLED = 'false'
  PSON_ENFORCE_SUBJECT_USER = 'true'
  PSON_JWT_USER_ID_CLAIM = 'sub'
  PSON_PROFILE_STORE = 'postgres'
  PSON_SUBJECT_USER_HEADER = 'openai-user-id'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
