name: Bug report
description: Report a defect in a package, app, or docs flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - CLI
        - API
        - Docs
        - Storage
        - Provider
        - Privacy
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Commands, code, payloads, and steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, package version, backend mode, provider mode.
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Redact secrets and personal data before posting.
