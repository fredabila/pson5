name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: validate (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Storage adapter contract tests
        run: npm run test:storage

      - name: Postgres store contract tests
        run: npm run test:postgres-store

      - name: Core flow integration test
        run: npm run test:core-flow

      - name: Provider retry integration test
        run: npm run test:provider-retry

      - name: CLI JSON output integration test
        run: npm run test:cli-json
