<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="PSON5 — personalization your agents can actually reason about">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0f12"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#b6ff5c" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#b6ff5c" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#b6ff5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#f5f4ef" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <rect width="1200" height="420" fill="url(#glow)"/>

  <!-- subtle top edge line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#b6ff5c" stroke-opacity="0.5" stroke-width="1"/>

  <!-- three lanes: observed / inferred / simulated -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" letter-spacing="2">

    <!-- OBSERVED lane -->
    <text x="80" y="90" fill="#f5c76a" opacity="0.85">01 · OBSERVED</text>
    <text x="80" y="106" fill="#7d7b73">what the user said</text>
    <line x1="80" y1="120" x2="1120" y2="120" stroke="#f5c76a" stroke-opacity="0.24" stroke-width="1"/>
    <!-- tick marks -->
    <g stroke="#f5c76a" stroke-opacity="0.4">
      <line x1="80" y1="116" x2="80" y2="124"/>
      <line x1="340" y1="116" x2="340" y2="124"/>
      <line x1="600" y1="116" x2="600" y2="124"/>
      <line x1="860" y1="116" x2="860" y2="124"/>
      <line x1="1120" y1="116" x2="1120" y2="124"/>
    </g>
    <!-- travelling pulses -->
    <circle r="4" fill="#f5c76a" filter="url(#blur)" opacity="0.9">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 80 120 L 1120 120"/>
    </circle>
    <circle r="3" fill="#f5c76a">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 80 120 L 1120 120"/>
    </circle>
    <circle r="3" fill="#f5c76a" opacity="0.7">
      <animateMotion dur="6s" begin="-2s" repeatCount="indefinite" path="M 80 120 L 1120 120"/>
    </circle>
    <circle r="2" fill="#f5c76a" opacity="0.5">
      <animateMotion dur="6s" begin="-4s" repeatCount="indefinite" path="M 80 120 L 1120 120"/>
    </circle>

    <!-- INFERRED lane -->
    <text x="80" y="180" fill="#b6ff5c" opacity="0.9">02 · INFERRED</text>
    <text x="80" y="196" fill="#7d7b73">what the model thinks</text>
    <line x1="80" y1="210" x2="1120" y2="210" stroke="#b6ff5c" stroke-opacity="0.3" stroke-width="1"/>
    <g stroke="#b6ff5c" stroke-opacity="0.5">
      <line x1="80" y1="206" x2="80" y2="214"/>
      <line x1="340" y1="206" x2="340" y2="214"/>
      <line x1="600" y1="206" x2="600" y2="214"/>
      <line x1="860" y1="206" x2="860" y2="214"/>
      <line x1="1120" y1="206" x2="1120" y2="214"/>
    </g>
    <circle r="5" fill="#b6ff5c" filter="url(#blur)" opacity="0.95">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M 80 210 L 1120 210"/>
    </circle>
    <circle r="4" fill="#b6ff5c">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M 80 210 L 1120 210"/>
    </circle>
    <circle r="3" fill="#b6ff5c" opacity="0.8">
      <animateMotion dur="4.5s" begin="-1.5s" repeatCount="indefinite" path="M 80 210 L 1120 210"/>
    </circle>
    <circle r="2.5" fill="#b6ff5c" opacity="0.6">
      <animateMotion dur="4.5s" begin="-3s" repeatCount="indefinite" path="M 80 210 L 1120 210"/>
    </circle>

    <!-- SIMULATED lane -->
    <text x="80" y="270" fill="#8ec7ff" opacity="0.85">03 · SIMULATED</text>
    <text x="80" y="286" fill="#7d7b73">what the engine predicts</text>
    <line x1="80" y1="300" x2="1120" y2="300" stroke="#8ec7ff" stroke-opacity="0.24" stroke-width="1" stroke-dasharray="4 4"/>
    <g stroke="#8ec7ff" stroke-opacity="0.4">
      <line x1="80" y1="296" x2="80" y2="304"/>
      <line x1="340" y1="296" x2="340" y2="304"/>
      <line x1="600" y1="296" x2="600" y2="304"/>
      <line x1="860" y1="296" x2="860" y2="304"/>
      <line x1="1120" y1="296" x2="1120" y2="304"/>
    </g>
    <circle r="4" fill="#8ec7ff" filter="url(#blur)" opacity="0.9">
      <animateMotion dur="8s" repeatCount="indefinite" path="M 80 300 L 1120 300"/>
    </circle>
    <circle r="3" fill="#8ec7ff">
      <animateMotion dur="8s" repeatCount="indefinite" path="M 80 300 L 1120 300"/>
    </circle>
    <circle r="2.5" fill="#8ec7ff" opacity="0.55">
      <animateMotion dur="8s" begin="-3s" repeatCount="indefinite" path="M 80 300 L 1120 300"/>
    </circle>
  </g>

  <!-- central wordmark + tagline -->
  <g font-family="'Fraunces', 'New York', 'Iowan Old Style', Georgia, serif" fill="#f5f4ef">
    <!-- phosphor dot -->
    <circle cx="520" cy="360" r="5" fill="#b6ff5c">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="360" r="12" fill="#b6ff5c" filter="url(#softBlur)" opacity="0.45">
      <animate attributeName="opacity" values="0.2;0.55;0.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <text x="540" y="372" font-size="40" font-weight="500" letter-spacing="-1.5">
      PSON<tspan font-style="italic" font-weight="400">5</tspan>
    </text>

    <text x="600" y="405" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" fill="#b8b6ae" letter-spacing="2">
      PERSONALIZATION YOUR AGENTS CAN ACTUALLY REASON ABOUT
    </text>
  </g>

  <!-- corner markers -->
  <g stroke="#f5f4ef" stroke-opacity="0.15" fill="none">
    <path d="M 8 8 L 32 8 L 32 32"/>
    <path d="M 1192 8 L 1168 8 L 1168 32"/>
    <path d="M 8 412 L 32 412 L 32 388"/>
    <path d="M 1192 412 L 1168 412 L 1168 388"/>
  </g>
</svg>
